<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в админ-панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/tickets/new}">Создать заявку</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h3 mb-3 text-center">Вход администратора</h1>

                    <!-- Сообщение об ошибке -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        Неверный логин или пароль
                    </div>

                    <!-- Сообщение о выходе -->
                    <div th:if="${param.logout}" class="alert alert-success">
                        Вы вышли из системы
                    </div>

                    <!-- Форма входа -->
                    <form th:action="@{/login}" method="post">
                        <!-- CSRF-токен (защита от поддельных запросов) -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label">Логин</label>
                            <input type="text" id="username" name="username"
                                   class="form-control" placeholder="admin">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" id="password" name="password"
                                   class="form-control" placeholder="admin">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </form>

                    <p class="text-muted small mt-3 text-center">
                        Учебный доступ: admin / admin
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
